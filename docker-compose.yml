services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio-inventario-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: inventario
    ports:
      - "5435:5432"
    volumes:
      - desafio_inventario_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario -d inventario"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  desafio_inventario_pgdata:
